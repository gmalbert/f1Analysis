name: Weekly Data Refresh

on:
  # 4E: Run every Monday 04:00 UTC — day after race Sunday — to pull the latest
  # incremental data (race messages, weather, first-lap positions, etc.) so the
  # generator always has fresh inputs before models are retrained.
  schedule:
    - cron: '0 4 * 3-11 mon'   # Mar–Nov: Monday 04:00 UTC
    - cron: '0 4 * 12,1,2 mon' # Dec–Feb: Monday 04:00 UTC
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.11'

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write   # needed to push updated data files back to main

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Show job context
        run: |
          echo "Job started at $(date -u)"
          git log -1 --oneline
          git fetch origin main

      # Each script below is incremental — it skips sessions already present
      # in the output file, so re-running is always safe.

      - name: Pull race control messages (incremental)
        run: python f1-raceMessages.py
        env:
          LOCAL_RUN: '1'

      - name: Pull first-lap positions (incremental)
        run: python f1-first-lap-positions.py
        env:
          LOCAL_RUN: '1'

      - name: Pull weather for new races
        run: python f1-analysis-weather.py
        env:
          LOCAL_RUN: '1'

      - name: Pull tire strategy data (incremental)
        run: python f1-tire-strategy.py
        env:
          LOCAL_RUN: '1'
        # Non-fatal: tire data may not always update (empty season or script not yet run)
        continue-on-error: true

      - name: Pull race pace laps (incremental)
        run: python f1-race-pace-laps.py
        env:
          LOCAL_RUN: '1'
        continue-on-error: true

      - name: Commit updated data files
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git pull --ff-only origin main || true
          git add \
            data_files/all_race_control_messages.csv \
            data_files/first_lap_positions.csv \
            data_files/f1WeatherData_AllData.csv \
            data_files/f1WeatherData_Grouped.csv \
            data_files/tire_strategy_data.csv \
            data_files/race_pace_lap_data.csv \
            || true  # ignore if any file doesn't exist yet
          if git diff --staged --quiet; then
            echo "No data changes — nothing to commit"
          else
            git commit -m "data: weekly auto-refresh [skip ci]"
            git push
            echo "Pushed refreshed data files to main"
          fi

      - name: Show post-push status
        run: |
          echo "Job finished at $(date -u)"
          git log -1 --oneline
